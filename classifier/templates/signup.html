{% extends "base.html" %}
{% block title %}Đăng Ký - DogShop{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-8">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-10">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-amber-50 rounded-2xl mb-4">
          <i class="fa-solid fa-dog text-3xl text-amber-500"></i>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-900">Tạo Tài Khoản</h1>
        <p class="text-slate-500 text-sm mt-1">Tham gia cộng đồng yêu chó của DogShop</p>
      </div>

      {% if error %}
      <div class="flex items-center gap-3 bg-red-50 text-red-700 border border-red-200 rounded-xl px-4 py-3 text-sm mb-5">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i> {{ error }}
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5"><i class="fa-solid fa-user mr-1.5 text-amber-400"></i>Tên đăng nhập</label>
          <input type="text" name="username" placeholder="Chọn tên đăng nhập..." required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition text-sm" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5"><i class="fa-solid fa-envelope mr-1.5 text-amber-400"></i>Email <span class="text-slate-400 font-normal">(Tuỳ chọn)</span></label>
          <input type="email" name="email" placeholder="email@example.com"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition text-sm" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5"><i class="fa-solid fa-lock mr-1.5 text-amber-400"></i>Mật khẩu</label>
          <input type="password" name="password" placeholder="Tạo mật khẩu..." required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition text-sm" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5"><i class="fa-solid fa-lock mr-1.5 text-amber-400"></i>Xác nhận mật khẩu</label>
          <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu..." required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition text-sm" />
        </div>
        <button type="submit" class="w-full flex items-center justify-center gap-2 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-sm text-base mt-2">
          <i class="fa-solid fa-user-plus"></i> Tạo Tài Khoản
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Đã có tài khoản? <a href="{% url 'login' %}" class="text-amber-600 font-semibold hover:text-amber-700 transition-colors">Đăng nhập</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
